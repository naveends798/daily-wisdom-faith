name: Daily Upload — 9 AM IST

on:
  # 03:30 UTC = 09:00 IST (UTC+05:30, no DST)
  schedule:
    - cron: '30 3 * * *'
  # Allow manual runs for testing from the Actions tab
  workflow_dispatch:

concurrency:
  group: daily-upload
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CHANNEL_NAME: ${{ vars.CHANNEL_NAME || 'Daily Wisdom Faith' }}
      CHANNEL_HANDLE: ${{ vars.CHANNEL_HANDLE || '@DailyWisdomFaith' }}
      NOTIFY_EMAIL: ${{ vars.NOTIFY_EMAIL || 'naveends798@gmail.com' }}
      TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Kolkata' }}
      PUBLISH_HOUR_LOCAL: ${{ vars.PUBLISH_HOUR_LOCAL || '9' }}

      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      DRIVE_QUEUE_FOLDER_ID: ${{ secrets.DRIVE_QUEUE_FOLDER_ID }}

      OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE || 'https://api.openai.com/v1' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}

      SMTP_USER: ${{ vars.SMTP_USER || 'naveends798@gmail.com' }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        run: python -m src.main

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ github.run_id }}
          path: |
            work/
          retention-days: 7
          if-no-files-found: ignore
